# CI + GitHub Pages deploy (docs/spec/architecture.md#deployment, docs/spec/testing.md#ci-pipeline)
# PRs: validate content → typecheck → tests → build.
# Push to main: same, then deploy the static site to GitHub Pages.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run content:validate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: E2E (desktop + mobile, docs/spec/testing.md §3–4)
        run: npm run e2e
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-test
    # Serialize Pages deployments so rapid pushes to main don't race; never
    # cancel an in-flight deploy (a half-published site is worse than a queue).
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
